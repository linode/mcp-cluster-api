name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: 'go.mod'

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Build binary
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
        CGO_ENABLED: 0
      run: |
        BINARY_NAME="capi-mcp-${{ matrix.goos }}-${{ matrix.goarch }}"
        go build -ldflags="-s -w" -o "./bin/${BINARY_NAME}" main.go

    - name: Create release archive
      run: |
        BINARY_NAME="capi-mcp-${{ matrix.goos }}-${{ matrix.goarch }}"
        cd bin
        tar -czf "../${BINARY_NAME}.tar.gz" "${BINARY_NAME}"
        cd ..

    - name: Upload release assets
      uses: softprops/action-gh-release@v2
      with:
        files: |
          capi-mcp-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: release
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Generate changelog
      id: changelog
      run: |
        # Get the previous tag
        PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
        CURRENT_TAG=${{ github.event.release.tag_name }}
        
        echo "## Changes in ${CURRENT_TAG}" > CHANGELOG.md
        echo "" >> CHANGELOG.md
        
        if [ -n "$PREV_TAG" ]; then
          echo "### Commits since ${PREV_TAG}:" >> CHANGELOG.md
          git log --pretty=format:"- %s (%h)" ${PREV_TAG}..HEAD >> CHANGELOG.md
        else
          echo "### All commits:" >> CHANGELOG.md
          git log --pretty=format:"- %s (%h)" >> CHANGELOG.md
        fi
        
        echo "" >> CHANGELOG.md
        echo "## Installation" >> CHANGELOG.md
        echo "" >> CHANGELOG.md
        echo "Download the appropriate binary for your platform from the assets below:" >> CHANGELOG.md
        echo "" >> CHANGELOG.md
        echo "- **Linux AMD64**: \`capi-mcp-linux-amd64.tar.gz\`" >> CHANGELOG.md
        echo "- **Linux ARM64**: \`capi-mcp-linux-arm64.tar.gz\`" >> CHANGELOG.md
        echo "- **macOS AMD64**: \`capi-mcp-darwin-amd64.tar.gz\`" >> CHANGELOG.md
        echo "- **macOS ARM64** (Apple Silicon): \`capi-mcp-darwin-arm64.tar.gz\`" >> CHANGELOG.md
        echo "" >> CHANGELOG.md
        echo "Extract and place the binary in your PATH." >> CHANGELOG.md

    - name: Update release with changelog
      uses: softprops/action-gh-release@v2
      with:
        body_path: CHANGELOG.md
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
